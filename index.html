<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AZZURRO Illustration Portfolio</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- STAR COUNTER -->
  <div id="star-counter">⭐ 0 / 50</div>

  <!-- SIDEBAR -->
  <div id="sidebar">

    <img
      src="images/illustrations1.png"
      id="sidebar-logo"
      alt="AZZURRO illustration logo"
    >

    <div class="sidebar-title">
      by the artist AZZURRO
    </div>

    <div class="sidebar-subtitle">
      azzurroarts@gmail.com
    </div>

    <a
      id="artistCVButton"
      href="https://drive.google.com/drive/folders/1VdxbX5lhX3KSwzo4dSjNtNu71ZIHQP-z?usp=sharing"
      target="_blank"
      rel="noopener noreferrer"
      class="xp-button"
    >
      artist CV
    </a>

    <div id="search-container">
      <input
        type="text"
        id="search"
        placeholder="Search all..."
      >
    </div>

    <div id="categories"></div>

  </div>

  <!-- MAIN GALLERY -->
  <div id="main">
    <div id="gallery"></div>
  </div>

  <div id="floating-category"></div>

  <!-- TYPEFORM POPUP SCRIPT -->
  <script src="https://embed.typeform.com/next/embed.js"></script>

  <!-- YOUR SITE SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
